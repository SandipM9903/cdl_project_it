# ==================== LOGGING CONFIGURATION ====================
logging:
  # Log levels for different packages
  level:
    root: INFO
    com.cdl.epms: DEBUG
    com.cdl.epms.controller: DEBUG
    com.cdl.epms.service: DEBUG
    com.cdl.epms.service.serviceImpl: DEBUG
    com.cdl.epms.repository: DEBUG
    org.hibernate: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.web: DEBUG
    org.springframework.web.servlet: DEBUG
    org.springframework.boot: INFO
    org.apache.catalina: INFO
    org.apache.tomcat: INFO

  # Log file configuration
  file:
    name: logs/epms-application.log  # Log file path
    max-size: 10MB  # Max size per log file
    max-history: 30  # Keep 30 days of logs

  # Log pattern configuration
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

  # Logback specific configuration
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
      total-size-cap: 100MB

# Application URLs (Frontend) - Local Environment
app:
  frontend:
    url: http://localhost:3000
    paths:
      manager-goal-setting: /manager/goal-setting
      manager-dashboard: /manager/dashboard
      manager-annual-review: /manager/annual-review
      employee-annual-review: /employee/annual-review
      employee-dashboard: /employee/dashboard