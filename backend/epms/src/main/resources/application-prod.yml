# ==================== PRODUCTION LOGGING ====================
logging:
  level:
    root: WARN
    com.cdl.epms: INFO
    org.hibernate: WARN
    org.springframework.web: WARN

  file:
    name: logs/epms-application.log
    max-size: 100MB
    max-history: 90

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"

  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-history: 90
      total-size-cap: 5GB

# Application URLs
app:
  frontend:
    url: http://172.19.63.182:9008
    paths:
      manager-goal-setting: /manager/goal-setting
      manager-dashboard: /manager/dashboard
      manager-annual-review: /manager/annual-review
      employee-annual-review: /employee/annual-review
      employee-dashboard: /employee/dashboard

# Disable Swagger in PROD
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false