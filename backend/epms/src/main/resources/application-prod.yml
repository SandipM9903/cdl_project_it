server:
  port: 9009
  tomcat:
    max-threads: 200
    min-spare-threads: 20

spring:
  application:
    name: epms

  datasource:
    url: jdbc:postgresql://172.19.63.180:5432/epms
    username: postgres
    password: pgadmin
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  servlet:
    multipart:
      enabled: true
      max-file-size: 1GB
      max-request-size: 1GB

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        use_sql_comments: false

  mail:
    host: smtp.office365.com
    port: 587
    username: cdladmin@cms.co.in
    password: hrbxlsskgstdgmkh
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 30000
          timeout: 30000
          writetimeout: 30000
          maxconnections: 10
          connectionpoolsize: 10
    from: cdladmin@cms.co.in

# Email configuration
email:
